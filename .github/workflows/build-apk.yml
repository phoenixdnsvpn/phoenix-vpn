name: Build VayDNS Android APK (Multi-Arch)

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Set up Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;27.0.12077973" 
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Go Mobile Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          $(go env GOPATH)/bin/gomobile init

      - name: Clean Previous Builds
        working-directory: ./android
        run: chmod +x gradlew && ./gradlew clean

      - name: Build Core Android Libraries (.aar)
        working-directory: ./mobile
        run: |
          go mod tidy
          mkdir -p ../android/app/libs
          
          # Build ARM64 (64-bit)
          $(go env GOPATH)/bin/gomobile bind -v \
            -target=android/arm64 \
            -androidapi 24 \
            -ldflags="-s -w" \
            -trimpath \
            -o ../android/app/libs/vaydns-arm64.aar .
            
          # Build ARM (32-bit / armeabi-v7a)
          $(go env GOPATH)/bin/gomobile bind -v \
            -target=android/arm \
            -androidapi 24 \
            -ldflags="-s -w" \
            -trimpath \
            -o ../android/app/libs/vaydns-armeabi.aar .

      - name: Build Signed Debug APKs
        working-directory: ./android
        run: ./gradlew assembleDebug
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Rename and Prepare APKs
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          mkdir -p release-artifacts
          
          # Find generated APKs and move to artifact folder with new names
          # Note: If your gradle isn't configured for splits, app-debug.apk is the default.
          # If splits are enabled, they are usually in subfolders by arch.
          
          find android/app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} release-artifacts/ \;
          
          # Handle potential multi-apk splits or single app-debug.apk
          if [ -f release-artifacts/app-arm64-v8a-debug.apk ]; then
            mv release-artifacts/app-arm64-v8a-debug.apk release-artifacts/VaydnsVpn-${TAG_NAME}-arm64-v8a.apk
          elif [ -f release-artifacts/app-debug.apk ]; then
             # Fallback if splits aren't enabled, though this APK would contain only the last built AAR
             mv release-artifacts/app-debug.apk release-artifacts/VaydnsVpn-${TAG_NAME}-universal.apk
          fi
          
          if [ -f release-artifacts/app-armeabi-v7a-debug.apk ]; then
            mv release-artifacts/app-armeabi-v7a-debug.apk release-artifacts/VaydnsVpn-${TAG_NAME}-armeabi-v7a.apk
          fi

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-artifacts/VaydnsVpn-*.apk
            android/app/libs/vaydns-arm64.aar
            android/app/libs/vaydns-armeabi.aar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
