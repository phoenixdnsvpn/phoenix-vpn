name: Build VayDNS Android APK (Multi-Arch)

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Install Go Mobile Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          $(go env GOPATH)/bin/gomobile init

      # NEW: Decode the JKS file from your GitHub Secret
      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > release.jks

      - name: Build ARM64 Version
        env:
          DEFAULT_CONFIGS_JSON: ${{ secrets.DEFAULT_CONFIGS_JSON }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          cd mobile
          go mod tidy
          HEX_HASH=$(echo -n "${{ secrets.APP_PRIVATE_KEY }}" | sha256sum | awk '{print $1}')
          
          mkdir -p ../android/app/libs
          $(go env GOPATH)/bin/gomobile bind -v \
            -target=android/arm64 \
            -androidapi 24 \
            -ldflags="-s -w -X 'github.com/Starling226/vaydns-vpn.InjectedPrivateKey=$HEX_HASH'" \
            -trimpath \
            -o ../android/app/libs/vaydns-arm64.aar .
          
          cd ../android
          chmod +x gradlew
          # Updated to Release and added Signing flags
          ./gradlew assembleRelease \
            -Pandroid.injected.abi=arm64-v8a \
            -PtargetAar=vaydns-arm64.aar \
            -Pandroid.injected.signing.store.file=$(pwd)/../release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
          
          mkdir -p ../release-artifacts
          TAG_NAME=${GITHUB_REF#refs/tags/}
          # Note: Path changed from 'debug' to 'release'
          cp app/build/outputs/apk/release/app-release.apk ../release-artifacts/VaydnsVpn-${TAG_NAME}-arm64-v8a.apk
          cp app/libs/vaydns-arm64.aar ../release-artifacts/

      - name: Build ARMv7 Version
        env:
          DEFAULT_CONFIGS_JSON: ${{ secrets.DEFAULT_CONFIGS_JSON }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          cd mobile
          go mod tidy
          HEX_HASH=$(echo -n "${{ secrets.APP_PRIVATE_KEY }}" | sha256sum | awk '{print $1}')
          
          mkdir -p ../android/app/libs
          $(go env GOPATH)/bin/gomobile bind -v \
            -target=android/arm \
            -androidapi 24 \
            -ldflags="-s -w -X 'github.com/Starling226/vaydns-vpn.InjectedPrivateKey=$HEX_HASH'" \
            -trimpath \
            -o ../android/app/libs/vaydns-armeabi.aar .
          
          cd ../android
          ./gradlew clean
          ./gradlew assembleRelease \
            -Pandroid.injected.abi=armeabi-v7a \
            -PtargetAar=vaydns-armeabi.aar \
            -Pandroid.injected.signing.store.file=$(pwd)/../release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
          
          TAG_NAME=${GITHUB_REF#refs/tags/}
          cp app/build/outputs/apk/release/app-release.apk ../release-artifacts/VaydnsVpn-${TAG_NAME}-armeabi-v7a.apk
          cp app/libs/vaydns-armeabi.aar ../release-artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-artifacts/VaydnsVpn-*.apk
            release-artifacts/vaydns-*.aar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
