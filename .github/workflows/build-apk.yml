name: Build VayDNS Android APK (Multi-Arch)

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Set up Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;27.0.12077973" 
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Go Mobile Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          $(go env GOPATH)/bin/gomobile init

      - name: Build ARM64 Version
        env:
          # ADDED THIS: ARM64 needs the secret too!
          DEFAULT_CONFIGS_JSON: ${{ secrets.DEFAULT_CONFIGS_JSON }}
        run: |
          # 1. Build ARM64 AAR
          cd mobile
          go mod tidy
          mkdir -p ../android/app/libs
          $(go env GOPATH)/bin/gomobile bind -v \
            -target=android/arm64 \
            -androidapi 24 \
            -ldflags="-s -w" \
            -trimpath \
            -o ../android/app/libs/vaydns-arm64.aar .
          
          # 2. Build ARM64 APK
          cd ../android
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.injected.abi=arm64-v8a -PtargetAar=vaydns-arm64.aar
          
          # 3. Save artifacts
          mkdir -p ../release-artifacts
          TAG_NAME=${GITHUB_REF#refs/tags/}
          cp app/build/outputs/apk/debug/app-debug.apk ../release-artifacts/VaydnsVpn-${TAG_NAME}-arm64-v8a.apk
          cp app/libs/vaydns-arm64.aar ../release-artifacts/

      - name: Build ARMv7 Version
        env:
          DEFAULT_CONFIGS_JSON: ${{ secrets.DEFAULT_CONFIGS_JSON }}
        run: |
          # 1. Build ARMv7 AAR
          cd mobile
          go mod tidy
          mkdir -p ../android/app/libs
          $(go env GOPATH)/bin/gomobile bind -v \
            -target=android/arm \
            -androidapi 24 \
            -ldflags="-s -w" \
            -trimpath \
            -o ../android/app/libs/vaydns-armeabi.aar .
          
          # 2. Build ARMv7 APK
          cd ../android
          # Clean build outputs but keep the libs folder
          ./gradlew clean
          ./gradlew assembleDebug -Pandroid.injected.abi=armeabi-v7a -PtargetAar=vaydns-armeabi.aar
          
          # 3. Save artifacts
          TAG_NAME=${GITHUB_REF#refs/tags/}
          cp app/build/outputs/apk/debug/app-debug.apk ../release-artifacts/VaydnsVpn-${TAG_NAME}-armeabi-v7a.apk
          cp app/libs/vaydns-armeabi.aar ../release-artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-artifacts/VaydnsVpn-*.apk
            release-artifacts/vaydns-arm64.aar
            release-artifacts/vaydns-armeabi.aar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
