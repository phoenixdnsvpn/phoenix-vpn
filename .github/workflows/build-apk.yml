name: Build VayDNS Android APK (Core)

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Set up Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;27.0.12077973" 
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Go Mobile Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          $(go env GOPATH)/bin/gomobile init

      - name: Clean Previous Builds
        working-directory: ./android
        run: ./gradlew clean

      - name: Build Core Android Library (.aar)
        working-directory: ./mobile
        run: |
          go mod tidy
          mkdir -p ../android/app/libs
          $(go env GOPATH)/bin/gomobile bind -v \
            -target=android/arm64 \
            -androidapi 24 \
            -ldflags="-s -w" \
            -trimpath \
            -o ../android/app/libs/vaydns-arm64.aar .

      - name: Build Signed Debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Rename and Prepare APK
        # This renames the debug APK to your specific requested format
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/VaydnsVpn-${TAG_NAME}-arm64-v8a.apk

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            android/app/build/outputs/apk/debug/VaydnsVpn-*-arm64-v8a.apk
            android/app/libs/vaydns-arm64.aar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
