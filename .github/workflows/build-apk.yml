name: Build VayDNS Android APK (Core)

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v0.2.7

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'

      - name: Set up Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;27.0.12077973" 
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Go Mobile Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          $(go env GOPATH)/bin/gomobile init

      - name: Build Core Android Library (.aar)
        # This builds the mobile bridge WITHOUT the scanner package
        working-directory: ./mobile
        run: |
          go mod tidy
          # Create the libs directory inside the android app module
          mkdir -p ../android/app/libs
          $(go env GOPATH)/bin/gomobile bind -v \
            -target=android/arm64 \
            -androidapi 24 \
            -ldflags="-s -w" \
            -trimpath \
            -o ../android/app/libs/vaydns-arm64.aar .

      - name: Build APK
        # Points to the directory containing gradlew and build.gradle.kts
        working-directory: ./android
        run: ./gradlew assembleRelease
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/libs/vaydns-arm64.aar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
