name: Build Vaydns VPN (Multi-Arch)

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # The Android SDK is pre-installed on ubuntu-latest, but this ensures specific versions
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          gomobile init

      # --- STEP 1: Build AARs for specific architectures ---
      # Note: Ensure android/app/libs exists in your repository structure
      
      - name: Build ARM64 AAR
        run: |
          mkdir -p android/app/libs
          gomobile bind -v -target=android/arm64 -o android/app/libs/vaydns-arm64.aar ./mobile

      - name: Build ARMv7 AAR
        run: |
          mkdir -p android/app/libs
          gomobile bind -v -target=android/arm -o android/app/libs/vaydns-armeabi.aar ./mobile

      # --- STEP 2: Build Android APKs ---
      
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Android APKs
        run: |
          cd android
          ./gradlew assembleRelease

      # --- STEP 3: Rename and Release ---

      - name: Prepare Release Files
        run: |
          mkdir -p release-artifacts
          # Copy AARs for release attachment
          cp android/app/libs/vaydns-arm64.aar release-artifacts/
          cp android/app/libs/vaydns-armeabi.aar release-artifacts/
          # Copy and rename APKs (Note: Adjust these paths if your Gradle output structure differs)
          cp android/app/build/outputs/apk/release/app-arm64-v8a-release.apk release-artifacts/VaydnsVpn-${{ github.ref_name }}-arm64-v8a.apk || true
          cp android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk release-artifacts/VaydnsVpn-${{ github.ref_name }}-armeabi-v7a.apk || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-artifacts/*.aar
            release-artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# --- IMPLEMENTATION NOTES ---
# 1. Ensure your android/app/build.gradle contains:
#    dependencies { implementation fileTree(dir: 'libs', include: ['*.aar']) }
# 2. If the APK paths in Step 3 fail, check your local build output path for Release APKs.
